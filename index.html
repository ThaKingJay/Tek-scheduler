<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DIAGEO TEK SCHEDULER - Production Line Technician Management System">
  <meta name="theme-color" content="#1e293b">
  <title>DIAGEO TEK SCHEDULER</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --primary-light: #3b82f6;
      --success: #16a34a;
      --warning: #ea580c;
      --danger: #dc2626;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 100%);
      color: var(--slate-900);
      line-height: 1.6;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(to right, #0f172a, #1e3a8a, #0f172a);
      color: white;
      padding: 24px;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .header p {
      color: #bfdbfe;
      font-size: 14px;
    }

    .nav-tabs {
      background: white;
      border-bottom: 1px solid var(--slate-200);
      padding: 16px 24px;
      margin: 24px 24px 0;
      border-radius: 8px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-wrap: wrap;
    }

    .nav-button {
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      background: var(--slate-100);
      color: var(--slate-600);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-button:hover {
      background: var(--slate-200);
    }

    .nav-button.active {
      background: var(--primary);
      color: white;
    }

    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 8px;
      border: 1px solid var(--slate-200);
      padding: 24px;
      margin-bottom: 24px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      padding: 24px;
      border-radius: 8px;
      border: 1px solid;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
      color: white;
    }

    .metric-label {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.9;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      margin-top: 8px;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    .schedule-table th {
      background: var(--slate-100);
      border-bottom: 1px solid var(--slate-200);
      padding: 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: var(--slate-900);
    }

    .schedule-table td {
      padding: 12px;
      border-bottom: 1px solid var(--slate-200);
      font-size: 14px;
    }

    .schedule-cell {
      min-height: 100px;
      padding: 12px;
      border: 2px solid;
      border-radius: 4px;
      text-align: center;
      cursor: drop;
    }

    .cell-empty {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    .cell-partial {
      background: #fffbeb;
      border-color: #fcd34d;
    }

    .cell-full {
      background: #f0fdf4;
      border-color: #86efac;
    }

    .tech-card {
      background: white;
      border: 2px solid var(--primary-light);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: grab;
      font-size: 13px;
      font-weight: 600;
      color: var(--slate-900);
      user-select: none;
      display: inline-block;
      margin: 4px;
    }

    .tech-card:active {
      cursor: grabbing;
    }

    .tech-assigned {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: white;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--slate-900);
      margin-bottom: 4px;
    }

    .conflict-item {
      padding: 16px;
      border-radius: 8px;
      border: 2px solid #fca5a5;
      background: #fef2f2;
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .conflict-icon {
      font-size: 20px;
    }

    .conflict-text {
      flex: 1;
    }

    .conflict-title {
      font-weight: 600;
      color: #7f1d1d;
    }

    .conflict-message {
      font-size: 13px;
      color: #b91c1c;
      margin-top: 4px;
    }

    .no-conflicts {
      padding: 24px;
      text-align: center;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
    }

    .no-conflicts-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .no-conflicts-title {
      font-weight: 600;
      color: #166534;
      margin-bottom: 4px;
    }

    .no-conflicts-text {
      color: #22c55e;
      font-size: 14px;
    }

    .button {
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .button-primary {
      background: var(--primary);
      color: white;
    }

    .button-primary:hover {
      background: var(--primary-dark);
    }

    .button-danger {
      background: #fee2e2;
      color: #dc2626;
    }

    .button-danger:hover {
      background: #fecaca;
    }

    .input-text {
      padding: 8px 12px;
      border: 1px solid var(--slate-300);
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      max-width: 300px;
    }

    .status-active {
      background: #dcfce7;
      color: #166534;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .status-inactive {
      background: #f3f4f6;
      color: #6b7280;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .drag-box {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
    }

    .drag-box-title {
      font-weight: 600;
      color: #1e40af;
      margin-bottom: 12px;
    }

    .drag-box-content {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tech-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .tech-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--slate-50);
      border-radius: 6px;
      border: 1px solid var(--slate-200);
    }

    .tech-info {
      flex: 1;
    }

    .tech-name {
      font-weight: 600;
      color: var(--slate-900);
    }

    .tech-email {
      font-size: 13px;
      color: var(--slate-600);
    }

    .tech-actions {
      display: flex;
      gap: 8px;
    }

    .button-small {
      padding: 4px 8px;
      font-size: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--slate-600);
    }

    .button-small:hover {
      color: var(--slate-900);
    }

    .cert-table {
      width: 100%;
      margin-top: 12px;
    }

    .cert-table-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--slate-200);
      align-items: center;
    }

    .cert-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--slate-700);
    }

    .cert-select {
      padding: 6px 8px;
      border: 1px solid var(--slate-300);
      border-radius: 4px;
      font-size: 13px;
      width: 100px;
    }

    .shift-tabs {
      display: flex;
      border-bottom: 1px solid var(--slate-200);
      margin-bottom: 16px;
    }

    .shift-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: 600;
      background: var(--slate-50);
      color: var(--slate-600);
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .shift-tab.active {
      background: #eff6ff;
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 16px;
      }

      .nav-tabs {
        margin: 12px;
        padding: 12px;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }

      .schedule-table {
        font-size: 12px;
      }

      .schedule-table th,
      .schedule-table td {
        padding: 8px;
      }
    }

    .print-button {
      background: var(--primary);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .print-button:hover {
      background: var(--primary-dark);
    }

    .date-input {
      padding: 8px 12px;
      border: 1px solid var(--slate-300);
      border-radius: 6px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .color-green {
      color: var(--success);
    }

    .color-red {
      color: var(--danger);
    }

    .color-warning {
      color: var(--warning);
    }
  </style>
</head>
<body>
  <div id="root" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif;">
    <div style="text-align: center; padding: 20px;">
      <div style="font-size: 24px; margin-bottom: 16px;">⏳</div>
      <p style="color: #666; font-size: 16px;">Loading DIAGEO TEK SCHEDULER...</p>
      <p style="color: #999; font-size: 12px; margin-top: 8px;">If this takes more than 10 seconds, please refresh the page</p>
    </div>
  </div>

  <script>
    // Check if React loaded
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (typeof React === 'undefined') {
          document.getElementById('root').innerHTML = `
            <div style="text-align: center; padding: 40px; font-family: sans-serif;">
              <div style="font-size: 48px; margin-bottom: 16px; color: #dc2626;">⚠️</div>
              <p style="font-size: 18px; color: #0f172a; font-weight: bold; margin-bottom: 12px;">Failed to Load</p>
              <p style="color: #475569; margin-bottom: 16px;">The application couldn't load React from the internet.</p>
              <p style="color: #64748b; font-size: 14px; margin-bottom: 16px;">
                This usually means:<br>
                • Your internet connection is slow or down<br>
                • Your firewall is blocking CDN access<br>
                • The CDN is temporarily unavailable
              </p>
              <button onclick="location.reload()" style="
                background: #2563eb;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
              ">Try Again</button>
            </div>
          `;
        }
      }, 5000);
    });
  </script>

  <script>
    const { useState, useRef } = React;

    function TechScheduler() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [technicians, setTechnicians] = useState([
        { id: 't1', name: 'Tom Lee', shift: '1st Shift', email: 'tom@company.com', status: 'active' },
        { id: 't2', name: 'Sarah Johnson', shift: '2nd Shift', email: 'sarah@company.com', status: 'active' },
        { id: 't3', name: 'Mike Davis', shift: '3rd Shift', email: 'mike@company.com', status: 'active' },
        { id: 't4', name: 'John Smith', shift: '1st Shift', email: 'john@company.com', status: 'active' },
      ]);

      const [certifications, setCertifications] = useState({
        t1: { 'Line 21-Depal': 2, 'Line 21-Filler': 3, 'Line 21-Cartoner': 2 },
        t2: { 'Line 21-Depal': 3, 'Line 21-Filler': 2, 'Line 21-Cartoner': 3 },
        t3: { 'Line 22-Tray Packer': 2, 'Line 23-Labeler': 1 },
        t4: { 'Line 21-Depal': 1, 'Line 22-Tray Packer': 1 },
      });

      const [schedule, setSchedule] = useState({
        '2024-01-15': {
          '1st Shift': {
            'Line 21-Depal': ['t1'],
            'Line 21-Filler': ['t2'],
            'Line 21-Cartoner': [],
            'Line 22-Tray Packer': [],
            'Line 23-Labeler': [],
          },
          '2nd Shift': {
            'Line 21-Depal': ['t2'],
            'Line 21-Filler': [],
            'Line 21-Cartoner': ['t1'],
            'Line 22-Tray Packer': [],
            'Line 23-Labeler': [],
          },
          '3rd Shift': {
            'Line 21-Depal': [],
            'Line 21-Filler': ['t3'],
            'Line 21-Cartoner': [],
            'Line 22-Tray Packer': [],
            'Line 23-Labeler': [],
          },
        },
      });

      const [callOffs, setCallOffs] = useState([
        { id: 'c1', techId: 't2', date: '2024-01-15', shift: '1st Shift' },
      ]);

      const [selectedDate, setSelectedDate] = useState('2024-01-15');
      const [changeoversList, setChangeoversList] = useState([
        { id: 'co1', equipment: 'Line 21-Filler', techId: 't2', date: '2024-01-16', type: 'Can size change' },
      ]);

      const [activeShiftTab, setActiveShiftTab] = useState('1st Shift');

      const lines = [
        { id: 'l1', name: 'Line 21', equipment: ['Depal', 'Filler', 'Cartoner'] },
        { id: 'l2', name: 'Line 22', equipment: ['Tray Packer'] },
        { id: 'l3', name: 'Line 23', equipment: ['Labeler'] },
      ];

      const shifts = ['1st Shift', '2nd Shift', '3rd Shift'];
      const equipmentRequirements = {
        'Line 22-Tray Packer': { minLevel: 1, needs2: true },
        'Line 21-Filler': { minLevel: 2 },
      };

      const draggedTech = useRef(null);

      const handleDragStart = (e, techId) => {
        draggedTech.current = techId;
      };

      const handleDrop = (e, shift, equipment) => {
        e.preventDefault();
        const techId = draggedTech.current;
        const key = selectedDate;
        const minLevel = equipmentRequirements[equipment]?.minLevel || 0;
        const techLevel = certifications[techId]?.[equipment] || 0;

        if (techLevel < minLevel) {
          alert(`Tech needs Level ${minLevel} certification for ${equipment}`);
          return;
        }

        const newSchedule = { ...schedule };
        if (!newSchedule[key]) newSchedule[key] = {};
        if (!newSchedule[key][shift]) newSchedule[key][shift] = {};
        if (!newSchedule[key][shift][equipment]) newSchedule[key][shift][equipment] = [];

        if (!newSchedule[key][shift][equipment].includes(techId)) {
          newSchedule[key][shift][equipment] = [...newSchedule[key][shift][equipment], techId];
          setSchedule(newSchedule);
        }
        draggedTech.current = null;
      };

      const removeTechFromSlot = (shift, equipment, techId) => {
        const key = selectedDate;
        const newSchedule = { ...schedule };
        if (newSchedule[key]?.[shift]?.[equipment]) {
          newSchedule[key][shift][equipment] = newSchedule[key][shift][equipment].filter(t => t !== techId);
          setSchedule(newSchedule);
        }
      };

      const getConflicts = () => {
        const conflicts = [];
        const scheduleData = schedule[selectedDate] || {};

        shifts.forEach(shift => {
          if (!scheduleData[shift]) return;
          
          Object.entries(scheduleData[shift]).forEach(([equipment, techs]) => {
            const req = equipmentRequirements[equipment];
            
            if (techs.length === 0) {
              conflicts.push({
                severity: 'critical',
                shift,
                equipment,
                message: `${equipment} unassigned in ${shift}`,
              });
            }

            if (req?.needs2 && techs.length < 2) {
              conflicts.push({
                severity: 'critical',
                shift,
                equipment,
                message: `${equipment} needs 2 people (has ${techs.length})`,
              });
            }

            techs.forEach(tid => {
              const isCalledOff = callOffs.some(co => co.techId === tid && co.date === selectedDate && co.shift === shift);
              if (isCalledOff) {
                conflicts.push({
                  severity: 'critical',
                  shift,
                  equipment,
                  message: `${getTechName(tid)} called off but scheduled`,
                });
              }
            });
          });
        });

        return conflicts;
      };

      const getTechName = (id) => technicians.find(t => t.id === id)?.name || 'Unknown';

      const totalTechs = technicians.length;
      const callOffsToday = callOffs.filter(co => co.date === selectedDate).length;
      const allEquipment = lines.flatMap(line => line.equipment.map(eq => `${line.name}-${eq}`));

      const renderDashboard = () => (
        <div>
          <h2 style={{ fontSize: '28px', fontWeight: 'bold', marginBottom: '24px' }}>Dashboard</h2>
          <div className="metric-grid">
            <div className="metric-card">
              <div className="metric-label">Total Technicians</div>
              <div className="metric-value">{totalTechs}</div>
            </div>
            <div className="metric-card" style={{ background: 'linear-gradient(135deg, #a855f7 0%, #9333ea 100%)' }}>
              <div className="metric-label">Shifts</div>
              <div className="metric-value">3</div>
            </div>
            <div className="metric-card" style={{ background: 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)' }}>
              <div className="metric-label">Production Lines</div>
              <div className="metric-value">3</div>
            </div>
            <div className="metric-card" style={{ background: 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)' }}>
              <div className="metric-label">Call-Offs Today</div>
              <div className="metric-value">{callOffsToday}</div>
            </div>
          </div>

          <div className="card">
            <h3 style={{ fontWeight: 'bold', fontSize: '18px', marginBottom: '16px' }}>System Overview</h3>
            <div style={{ fontSize: '14px', color: 'var(--slate-600)', lineHeight: '1.8' }}>
              <p>✓ <strong>{totalTechs}</strong> Technicians active</p>
              <p>✓ <strong>3</strong> Production lines configured</p>
              <p>✓ Real-time conflict detection enabled</p>
              <p>✓ Drag-drop schedule assignment ready</p>
            </div>
          </div>
        </div>
      );

      const renderSchedule = () => (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px', flexWrap: 'wrap', gap: '12px' }}>
            <h2 style={{ fontSize: '28px', fontWeight: 'bold' }}>Schedule Grid Editor</h2>
            <input 
              type="date" 
              value={selectedDate} 
              onChange={(e) => setSelectedDate(e.target.value)}
              className="date-input"
            />
          </div>

          <div className="card" style={{ overflowX: 'auto' }}>
            <table className="schedule-table">
              <thead>
                <tr>
                  <th>Equipment</th>
                  {shifts.map(shift => (
                    <th key={shift} style={{ textAlign: 'center' }}>{shift}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {allEquipment.map(equip => (
                  <tr key={equip}>
                    <td style={{ fontWeight: '600' }}>{equip}</td>
                    {shifts.map(shift => {
                      const scheduleData = schedule[selectedDate] || {};
                      const techs = scheduleData[shift]?.[equip] || [];
                      const req = equipmentRequirements[equip];
                      const isUncovered = techs.length === 0;
                      const isPartial = req?.needs2 && techs.length === 1;

                      return (
                        <td
                          key={`${equip}-${shift}`}
                          onDragOver={(e) => e.preventDefault()}
                          onDrop={(e) => handleDrop(e, shift, equip)}
                          className={`schedule-cell ${isUncovered ? 'cell-empty' : isPartial ? 'cell-partial' : 'cell-full'}`}
                        >
                          {techs.length > 0 ? (
                            <div>
                              {techs.map(tid => (
                                <div key={tid} className="tech-assigned">
                                  <span>{getTechName(tid)} L{certifications[tid]?.[equip] || 0}</span>
                                  <button 
                                    onClick={() => removeTechFromSlot(shift, equip, tid)}
                                    className="button-small"
                                    style={{ color: 'var(--danger)' }}
                                  >
                                    ×
                                  </button>
                                </div>
                              ))}
                              {req?.needs2 && techs.length === 1 && <div style={{ fontSize: '11px', color: '#b45309', fontWeight: '600' }}>Needs 2nd</div>}
                            </div>
                          ) : (
                            <div style={{ fontSize: '12px', color: 'var(--danger)', fontWeight: '600' }}>⚠️ Unassigned</div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="drag-box">
            <div className="drag-box-title">👥 Drag Technicians to Assign</div>
            <div className="drag-box-content">
              {technicians.map(tech => (
                <div
                  key={tech.id}
                  draggable
                  onDragStart={(e) => handleDragStart(e, tech.id)}
                  className="tech-card"
                >
                  {tech.name}
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      const renderConflicts = () => {
        const conflicts = getConflicts();

        return (
          <div>
            <h2 style={{ fontSize: '28px', fontWeight: 'bold', marginBottom: '24px' }}>Conflict Detection</h2>
            {conflicts.length === 0 ? (
              <div className="no-conflicts">
                <div className="no-conflicts-icon">✓</div>
                <div className="no-conflicts-title">No conflicts detected</div>
                <div className="no-conflicts-text">Schedule is fully optimized</div>
              </div>
            ) : (
              <div>
                {conflicts.map((conflict, i) => (
                  <div key={i} className="conflict-item">
                    <div className="conflict-icon">⚠️</div>
                    <div className="conflict-text">
                      <div className="conflict-title">{conflict.message}</div>
                      <div className="conflict-message">Action: {conflict.shift}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      };

      const renderTechnicians = () => {
        const activeShiftTechs = technicians.filter(t => t.shift === activeShiftTab);

        return (
          <div>
            <h2 style={{ fontSize: '28px', fontWeight: 'bold', marginBottom: '24px' }}>Technician Management</h2>
            <div className="card">
              <div className="shift-tabs">
                {shifts.map(shift => (
                  <button
                    key={shift}
                    onClick={() => setActiveShiftTab(shift)}
                    className={`shift-tab ${activeShiftTab === shift ? 'active' : ''}`}
                  >
                    {shift} ({technicians.filter(t => t.shift === shift).length})
                  </button>
                ))}
              </div>
              <div className="tech-list">
                {activeShiftTechs.map(tech => (
                  <div key={tech.id} className="tech-item">
                    <div className="tech-info">
                      <div className="tech-name">{tech.name}</div>
                      <div className="tech-email">{tech.email}</div>
                    </div>
                    <div className="tech-actions">
                      <span className={tech.status === 'active' ? 'status-active' : 'status-inactive'}>
                        {tech.status}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const renderCertifications = () => {
        return (
          <div>
            <h2 style={{ fontSize: '28px', fontWeight: 'bold', marginBottom: '24px' }}>Technician Certifications</h2>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
              {technicians.map(tech => (
                <div key={tech.id} className="card">
                  <h3 style={{ fontWeight: 'bold', color: 'var(--slate-900)', marginBottom: '16px' }}>{tech.name}</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px' }}>
                    {allEquipment.map(equip => (
                      <div key={equip} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <label style={{ fontSize: '13px', fontWeight: '600', color: 'var(--slate-700)' }}>{equip}</label>
                        <select
                          value={certifications[tech.id]?.[equip] || 0}
                          onChange={(e) => {
                            const newCerts = { ...certifications };
                            if (!newCerts[tech.id]) newCerts[tech.id] = {};
                            newCerts[tech.id][equip] = parseInt(e.target.value);
                            setCertifications(newCerts);
                          }}
                          className="cert-select"
                        >
                          <option value="0">L0</option>
                          <option value="1">L1</option>
                          <option value="2">L2</option>
                          <option value="3">L3</option>
                        </select>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const renderCallOffs = () => {
        return (
          <div>
            <h2 style={{ fontSize: '28px', fontWeight: 'bold', marginBottom: '24px' }}>Call-Off Management</h2>
            <div className="card" style={{ overflowX: 'auto' }}>
              <table className="schedule-table">
                <thead>
                  <tr>
                    <th>Technician</th>
                    <th>Date</th>
                    <th>Shift</th>
                    <th style={{ textAlign: 'center' }}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {callOffs.map(callOff => {
                    const tech = technicians.find(t => t.id === callOff.techId);
                    return (
                      <tr key={callOff.id}>
                        <td style={{ fontWeight: '600' }}>{tech?.name}</td>
                        <td>{callOff.date}</td>
                        <td>{callOff.shift}</td>
                        <td style={{ textAlign: 'center' }}>
                          <span style={{ background: '#fee2e2', color: '#991b1b', padding: '4px 8px', borderRadius: '4px', fontSize: '12px', fontWeight: '600' }}>Pending</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const renderChangeoverss = () => {
        return (
          <div>
            <h2 style={{ fontSize: '28px', fontWeight: 'bold', marginBottom: '24px' }}>Equipment Changeoverss</h2>
            <div className="card" style={{ overflowX: 'auto' }}>
              <table className="schedule-table">
                <thead>
                  <tr>
                    <th>Equipment</th>
                    <th>Technician</th>
                    <th>Date</th>
                    <th>Type</th>
                  </tr>
                </thead>
                <tbody>
                  {changeoversList.map(changeover => {
                    const tech = technicians.find(t => t.id === changeover.techId);
                    const techLevel = certifications[changeover.techId]?.[changeover.equipment] || 0;

                    return (
                      <tr key={changeover.id}>
                        <td style={{ fontWeight: '600' }}>{changeover.equipment}</td>
                        <td>{tech?.name} <span style={{ fontSize: '11px', color: 'var(--slate-600)' }}>(L{techLevel})</span></td>
                        <td>{changeover.date}</td>
                        <td>{changeover.type}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      return (
        <div>
          <div className="header">
            <h1>DIAGEO TEK SCHEDULER</h1>
            <p>Production Line Technician Management System</p>
          </div>

          <div className="nav-tabs">
            {[
              { id: 'dashboard', label: '📊 Dashboard' },
              { id: 'technicians', label: '👥 Technicians' },
              { id: 'schedule', label: '📋 Schedule' },
              { id: 'conflicts', label: '⚠️ Conflicts' },
              { id: 'certifications', label: '🎓 Certifications' },
              { id: 'calloffs', label: '📞 Call-Offs' },
              { id: 'changeoverss', label: '🔧 Changeoverss' },
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`nav-button ${activeTab === tab.id ? 'active' : ''}`}
              >
                {tab.label}
              </button>
            ))}
          </div>

          <div className="content">
            {activeTab === 'dashboard' && renderDashboard()}
            {activeTab === 'technicians' && renderTechnicians()}
            {activeTab === 'schedule' && renderSchedule()}
            {activeTab === 'conflicts' && renderConflicts()}
            {activeTab === 'certifications' && renderCertifications()}
            {activeTab === 'calloffs' && renderCallOffs()}
            {activeTab === 'changeoverss' && renderChangeoverss()}
          </div>
        </div>
      );
    }

    ReactDOM.render(<TechScheduler />, document.getElementById('root'));
  </script>
</body>
</html>
